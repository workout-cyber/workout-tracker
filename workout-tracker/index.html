<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker 2.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Workout Tracker</h1>
        <button id="darkToggle" class="toggle-btn">🌙</button>
    </div>

    <div class="input-box">
        <input id="exercise" placeholder="Exercise name">
        <input id="reps" type="number" placeholder="Reps">
        <input id="weight" type="number" placeholder="Weight (lbs)">
        <button class="add-btn" onclick="addWorkout()">Add</button>
    </div>

    <div class="favorites">
        <h3>Quick Add</h3>
        <div id="favBar"></div>
    </div>

    <h3>Total Volume: <span id="totalVolume">0</span> lbs</h3>
    <p id="comparisonText" class="subtext"></p>

    <h3>Personal Records</h3>
    <ul id="prList"></ul>

    <h3>Workout Log</h3>
    <ul id="log"></ul>

    <h3>Weekly Volume</h3>
    <canvas id="chartVolume"></canvas>

    <h3>PR History</h3>
    <canvas id="chartPR"></canvas>

    <h3>Calendar View</h3>
    <div id="calendar"></div>

</div>

<script src="script.js"></script>
</body>
</html>
