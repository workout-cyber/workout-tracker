<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker 2.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Workout Tracker</h1>
        <button id="darkToggle" class="toggle-btn" aria-label="Toggle dark mode">🌙</button>
    </div>

    <form class="input-box" onsubmit="event.preventDefault(); addWorkout();">
        <input id="exercise" type="text" placeholder="Exercise name" required>
        <input id="reps" type="number" placeholder="Reps" min="1" required>
        <input id="weight" type="number" placeholder="Weight (lbs)" min="0" step="any" required>
        <button type="submit" class="add-btn">Add</button>
    </form>

    <div class="favorites">
        <h3>Quick Add</h3>
        <div id="favBar"></div>
    </div>

    <div class="stats-section">
        <h3>Total Volume: <span id="totalVolume">0</span> lbs</h3>
        <p id="comparisonText" class="subtext"></p>
    </div>

    <h3>Personal Records</h3>
    <ul id="prList"></ul>

    <h3>Workout Log</h3>
    <ul id="log"></ul>

    <h3>Weekly Volume</h3>
    <div class="chart-container">
        <canvas id="chartVolume"></canvas>
    </div>

    <h3>PR History</h3>
    <div class="chart-container">
        <canvas id="chartPR"></canvas>
    </div>

    <h3>Calendar View</h3>
    <div id="calendar"></div>

</div>

<script src="script.js"></script>
</body>
</html>
